name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # 如果使用 OIDC 信任发布，此项必须为 write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 使用官方 Action 安装 Bun，替代 setup-node
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests (如有)
        run: bun test

      - name: Build (如有)
        run: bun run build

      # 使用 bun publish 发布，和 npm publish 完全兼容
      - name: Publish to npm
        run: bun publish --access public
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }} # 如果使用 Token 认证

